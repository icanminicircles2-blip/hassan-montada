<html lang="ar" dir="rtl">
<head>

  <style>
    /* نفس الـ CSS السابق (بدون تغيير) - أضفه هنا */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }

    .tabs-underline button .badge { background:var(--input-bg); padding:0px 8px; border-radius:40px; font-size:0.7rem; margin-right:4px; color:var(--text-secondary); }
    .tabs-underline button.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }

    .post-card .post-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
    .post-card .post-header .author-details { display:flex; align-items:center; gap:12px; }
    .post-card .post-header .author-details .avatar-sm { width:36px; height:36px; border-radius:50%; background:var(--primary-light); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.85rem; overflow:hidden; }
    .post-card .post-header .author-details .avatar-sm img { width:100%; height:100%; object-fit:cover; }
    .post-card .post-header .author-details .meta .name { font-weight:700; color:var(--text-primary); font-size:0.95rem; }

    .post-card .post-stats { display:flex; gap:20px; font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; border-top:1px solid var(--border-light); padding-top:12px; }

    .post-card .post-actions { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .post-card .post-actions .action-chip { background:var(--input-bg); border:none; padding:6px 16px; border-radius:40px; font-weight:600; font-size:0.85rem; color:var(--text-secondary); cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:6px; border:1px solid transparent; }
    .post-card .post-actions .action-chip:hover { background:var(--border-light); color:var(--text-primary); }
    .post-card .post-actions .action-chip.liked { color:var(--accent); background:rgba(245,158,11,0.12); border-color:var(--accent); }
    .comments-section { margin-top:18px; border-top:1px solid var(--border-light); padding-top:16px; }
    .comment-thread { margin-bottom:12px; }

    .comment-bubble .comment-header { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
    .comment-bubble .comment-header .c-avatar { width:28px; height:28px; border-radius:50%; background:var(--primary-light); display:flex; align-items:center; justify-content:center; color:white; font-size:0.7rem; font-weight:700; overflow:hidden; }
    .comment-bubble .comment-header strong { font-size:0.9rem; color:var(--text-primary); }
    .comment-bubble .comment-header .c-time { font-size:0.65rem; color:var(--text-muted); }
    .comment-bubble .comment-text { font-size:0.92rem; color:var(--text-secondary); }
    .comment-bubble .comment-actions { margin-top:6px; display:flex; gap:14px; }
    .comment-bubble .comment-actions button { background:none; border:none; font-size:0.7rem; color:var(--text-muted); cursor:pointer; font-weight:600; transition:var(--transition); }
    .comment-bubble .comment-actions button:hover { color:var(--primary); }
    .replies-container { margin-right:28px; border-right:2px solid var(--border-light); padding-right:16px; }
    .add-comment-form { display:flex; gap:10px; margin-top:10px; }
    .add-comment-form input { flex:1; padding:8px 16px; border-radius:40px; border:2px solid var(--border-light); background:var(--card-bg); color:var(--text-primary); outline:none; transition:var(--transition); }
    .add-comment-form input:focus { border-color:var(--primary); }
    .add-comment-form button { background:var(--primary); border:none; padding:8px 20px; border-radius:40px; color:white; font-weight:700; cursor:pointer; transition:var(--transition); white-space:nowrap; }
    .add-comment-form button:hover { background:var(--primary-dark); }
    .owner-controls { display:flex; gap:6px; align-items:center; }
    .owner-controls button { background:transparent; border:1px solid var(--border-light); padding:2px 10px; border-radius:30px; font-size:0.7rem; cursor:pointer; color:var(--text-muted); transition:var(--transition); }
    .owner-controls button:hover { background:var(--input-bg); color:var(--text-primary); }
    .owner-controls .edit-btn:hover { color:var(--primary); border-color:var(--primary); }
    .owner-controls .delete-btn:hover { color:#EF4444; border-color:#EF4444; }
    .msg { background:var(--input-bg); padding:20px; border-radius:var(--radius-md); text-align:center; color:var(--text-secondary); border:1px dashed var(--border-light); margin:20px 0; }
    #scrollToTop { position:fixed; bottom:30px; left:30px; width:44px; height:44px; border-radius:50%; background:var(--primary); color:white; border:none; font-size:1.3rem; cursor:pointer; box-shadow:0 4px 16px rgba(79,70,229,0.4); display:none; transition:var(--transition); z-index:999; }
    #scrollToTop.show { display:block; }
    #scrollToTop:hover { transform:scale(1.1) translateY(-4px); }
    @media (max-width:600px) { #app { padding:16px; } .header .brand { font-size:1.3rem; } .post-card { padding:16px; } .replies-container { margin-right:14px; padding-right:10px; } .dashboard-grid { grid-template-columns:1fr 1fr; } }
  </style>

<body>
<div id="app"></div>
<button id="scrollToTop" title="للأعلى">⬆</button>

<script type="module">
  // ===== استيراد Firebase =====
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    updateProfile,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getDatabase,
    ref,
    set,
    push,
    onValue,
    update,
    remove,
    get
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // ===== تكوين Firebase (استبدل ببيانات مشروعك) =====
  const firebaseConfig = {
    apiKey: "AIzaSyCBkRZYp0nJ8KD1hrnRrJhtqAYXPPyWxX4",
    authDomain: "hassan-montada.firebaseapp.com",
    databaseURL: "https://hassan-montada-default-rtdb.firebaseio.com",
    projectId: "hassan-montada",
    storageBucket: "hassan-montada.firebasestorage.app",
    messagingSenderId: "717408424399",
    appId: "1:717408424399:web:d0bd63f71d2ccff00082ba",
    measurementId: "G-3JNVZK3T2N"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // ===== متغيرات الحالة العامة =====
  let currentUser = null;
  let allPosts = [];
  let postsListener = null;
  let currentCategory = 'all';
  let searchQuery = '';
  let showTrash = false;
  let commentsVisibility = {};

  // ===== أدوات مساعدة =====
  function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

  function timeAgo(date) {
    const s = Math.floor((Date.now() - date) / 1000);
    if (s < 60) return 'الآن';
    const m = Math.floor(s / 60);
    if (m < 60) return `منذ ${m} د`;
    const h = Math.floor(m / 60);
    if (h < 24) return `منذ ${h} س`;
    const d = Math.floor(h / 24);
    if (d === 1) return 'أمس';
    if (d < 7) return `منذ ${d} ي`;
    return new Date(date).toLocaleDateString('ar-EG');
  }

  function getReactionEmoji(type) {
    const map = { like: '👍', love: '❤️', haha: '😂', sad: '😢', angry: '😡' };
    return map[type] || '❤️';
  }

  function renderMentions(text) {
    // لا نستخدم users هنا لأننا سنحصل عليهم من Firebase، ولكن نكتفي بتحويل @username إلى سبان
    // سنقوم بجلب المستخدمين من قاعدة البيانات إذا أردنا التحقق، لكن للتبسيط نتركها
    return text.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
  }

  // ===== دوال Firebase: المصادقة =====
  async function registerUser(username, email, password, profilePic = '') {
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    // تحديث الاسم في Authentication
    await updateProfile(user, { displayName: username });
    // حفظ البيانات الإضافية في Realtime Database
    await set(ref(db, `users/${user.uid}`), {
      username,
      email,
      profilePic,
      joined: Date.now()
    });
    // إرجاع كائن المستخدم مع جميع البيانات
    return { 
      user: { 
        uid: user.uid, 
        username, 
        email, 
        profilePic 
      } 
    };
  } catch (error) {
    return { error: error.message };
  }
}
async function loginUser(email, password) {
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    const snapshot = await get(ref(db, `users/${user.uid}`));
    const data = snapshot.val() || {};
    return { 
      user: { 
        uid: user.uid, 
        username: data.username || user.displayName || '', 
        email: user.email, 
        profilePic: data.profilePic || '' 
      } 
    };
  } catch (error) {
    return { error: error.message };
  }
}

  function logoutUser() {
    signOut(auth);
  }

  // ===== دوال Firebase: البوستات =====
  async function addPostToFirebase(title, content, category, authorId, authorName, authorPic) {
    const newPostRef = push(ref(db, 'posts'));
    const postData = {
      id: newPostRef.key,
      title,
      content,
      category,
      authorId,
      authorName,
      authorPic,
      reactions: { like: [], love: [], haha: [], sad: [], angry: [] },
      comments: {},
      views: 0,
      pinned: false,
      deletedAt: null,
      createdAt: Date.now()
    };
    await set(newPostRef, postData);
    return postData;
  }

  async function editPostInFirebase(postId, newTitle, newContent) {
    await update(ref(db, `posts/${postId}`), { title: newTitle, content: newContent });
  }

  async function deletePostInFirebase(postId, soft = true) {
    if (soft) {
      await update(ref(db, `posts/${postId}`), { deletedAt: Date.now() });
    } else {
      await remove(ref(db, `posts/${postId}`));
    }
  }

  async function restorePostInFirebase(postId) {
    await update(ref(db, `posts/${postId}`), { deletedAt: null });
  }

  async function togglePinInFirebase(postId) {
    // إلغاء تثبيت كل البوستات أولاً
    const snapshot = await get(ref(db, 'posts'));
    const data = snapshot.val();
    if (data) {
      const updates = {};
      Object.keys(data).forEach(key => {
        if (data[key].pinned) updates[`${key}/pinned`] = false;
      });
      await update(ref(db, 'posts'), updates);
    }
    // تثبيت البوست الحالي (عكس الحالة)
    const postRef = ref(db, `posts/${postId}`);
    const postSnap = await get(postRef);
    const post = postSnap.val();
    if (post) {
      await update(postRef, { pinned: !post.pinned });
    }
  }

  async function addReactionToFirebase(postId, userId, type) {
    const valid = ['like', 'love', 'haha', 'sad', 'angry'];
    if (!valid.includes(type)) return;
    const postRef = ref(db, `posts/${postId}`);
    const snapshot = await get(postRef);
    const post = snapshot.val();
    if (!post) return;
    const reactions = post.reactions || {};
    // إزالة التفاعلات السابقة من نفس المستخدم
    valid.forEach(t => {
      if (reactions[t] && reactions[t].includes(userId)) {
        const idx = reactions[t].indexOf(userId);
        if (idx !== -1) reactions[t].splice(idx, 1);
      }
    });
    // إضافة التفاعل الجديد
    if (!reactions[type]) reactions[type] = [];
    reactions[type].push(userId);
    await update(postRef, { reactions });
  }

  // دوال التعليقات (مع دعم الردود)
  async function addCommentToFirebase(postId, userId, userName, userPic, text, parentId = null) {
    const postRef = ref(db, `posts/${postId}`);
    const snapshot = await get(postRef);
    const post = snapshot.val();
    if (!post) return;
    const comments = post.comments || {};
    const newCommentId = generateId();
    const newComment = {
      id: newCommentId,
      userId,
      userName,
      userPic,
      text,
      parentId: parentId || null,
      replies: {},
      createdAt: Date.now()
    };
    if (parentId) {
      // نبحث عن التعليق الأب ونضيف الرد في replies
      const parentComment = comments[parentId];
      if (parentComment) {
        if (!parentComment.replies) parentComment.replies = {};
        parentComment.replies[newCommentId] = newComment;
        comments[parentId] = parentComment;
      } else {
        // قد يكون الأب في ردود أخرى، نبحث بشكل متكرر (هنا نكتفي بالبحث في المستوى الأول)
        // لكن للتبسيط نبحث في كل التعليقات
        let found = false;
        for (let key in comments) {
          if (comments[key].replies && comments[key].replies[parentId]) {
            comments[key].replies[parentId].replies[newCommentId] = newComment;
            found = true;
            break;
          }
        }
        if (!found) return;
      }
    } else {
      comments[newCommentId] = newComment;
    }
    await update(postRef, { comments });
  }

  async function deleteCommentFromFirebase(postId, commentId) {
    const postRef = ref(db, `posts/${postId}`);
    const snapshot = await get(postRef);
    const post = snapshot.val();
    if (!post) return;
    const comments = post.comments || {};
    // حذف من أي مستوى (نبحث)
    const removeRec = (obj) => {
      for (let key in obj) {
        if (key === commentId) {
          delete obj[key];
          return true;
        }
        if (obj[key].replies && removeRec(obj[key].replies)) {
          return true;
        }
      }
      return false;
    };
    removeRec(comments);
    await update(postRef, { comments });
  }

  async function incrementViewInFirebase(postId, userId) {
    // نستخدم طريقة بسيطة: زيادة views بـ 1 (بدون منع التكرار لأننا سنستخدمها محلياً)
    const postRef = ref(db, `posts/${postId}`);
    const snapshot = await get(postRef);
    const post = snapshot.val();
    if (post) {
      const views = (post.views || 0) + 1;
      await update(postRef, { views });
    }
  }

  // دالة ضغط الصورة (نفسها)
function compressImage(file, maxW = 80, maxH = 80) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxW) { h *= maxW / w; w = maxW; } } 
        else { if (h > maxH) { w *= maxH / h; h = maxH; } }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  function renderCommentsHTML(post, parentId = null, depth = 0) {
    const comments = post.comments || {};
    let filtered = [];
    if (parentId) {
      // البحث عن التعليق الأب
      const findComment = (obj) => {
        for (let key in obj) {
          if (key === parentId) return obj[key];
          if (obj[key].replies) {
            const found = findComment(obj[key].replies);
            if (found) return found;
          }
        }
        return null;
      };
      const parent = findComment(comments);
      if (parent && parent.replies) {
        filtered = Object.values(parent.replies);
      } else {
        return '';
      }
    } else {
      filtered = Object.values(comments).filter(c => !c.parentId);
    }
    if (filtered.length === 0) return '';
    return filtered.map(c => {
      const isOwner = c.userId === currentUser.uid;
      const repliesHtml = renderCommentsHTML(post, c.id, depth + 1);
      return `
        <div class="comment-thread" style="margin-right:${depth * 10}px;">
          <div class="comment-bubble">
            <div class="comment-header">
              ${c.userPic ? `<div class="c-avatar"><img src="${c.userPic}" style="width:100%;height:100%;object-fit:cover;" /></div>` : `<div class="c-avatar">${c.userName?.charAt(0) || '?'}</div>`}

            </div>
            <div class="comment-text">${renderMentions(c.text)}</div>

              <button class="reply-to-comment" data-postid="${post.id}" data-commentid="${c.id}">رد</button>

          </div>
          ${repliesHtml ? `<div class="replies-container">${repliesHtml}</div>` : ''}
        </div>
      `;
    }).join('');
  }

      const post = allPosts.find(p => p.id === id);
      if (post && !post.deletedAt) {
        // نزيد المشاهدة مرة واحدة لكل مستخدم (نستخدم localStorage مؤقت)
        const viewedKey = `viewed_${id}_${currentUser.uid}`;
        if (!localStorage.getItem(viewedKey)) {
          localStorage.setItem(viewedKey, 'true');
          incrementViewInFirebase(id, currentUser.uid);
        }
      }
    });
  }

  function updateTabBadges() {
    const all = allPosts.filter(p => !p.deletedAt);
    document.getElementById('badgeAll').textContent = all.length;
    document.getElementById('badgeFootball').textContent = all.filter(p => p.category === 'football').length;
    document.getElementById('badgeNovels').textContent = all.filter(p => p.category === 'novels').length;
  }

  function updateDashboard() {
    const myPosts = allPosts.filter(p => p.authorId === currentUser.uid && !p.deletedAt);
    const myDeleted = allPosts.filter(p => p.authorId === currentUser.uid && p.deletedAt);
    const totalReactions = allPosts.filter(p => p.authorId === currentUser.uid).reduce((acc, p) => {
      const r = p.reactions || {};
      return acc + Object.values(r).reduce((a,b) => a + b.length, 0);
    }, 0);
    const totalViews = allPosts.filter(p => p.authorId === currentUser.uid).reduce((acc, p) => acc + (p.views || 0), 0);
    document.getElementById('statMyPosts').textContent = myPosts.length;
    document.getElementById('statReactions').textContent = totalReactions;
    document.getElementById('statViews').textContent = totalViews;
    document.getElementById('statDeleted').textContent = myDeleted.length;
  }

  // ===== مراقبة حالة المصادقة =====
onAuthStateChanged(auth, (user) => {
  if (user) {
    // إذا كان currentUser غير معرف (حالة تسجيل الدخول العادي)، نقرأ البيانات
    if (!currentUser) {
      get(ref(db, `users/${user.uid}`)).then(snap => {
        const data = snap.val() || {};
        currentUser = {
          uid: user.uid,
          username: data.username || user.displayName || '',
          email: user.email,
          profilePic: data.profilePic || ''
        };
        renderMainScreen();
      });
    } else {
      // إذا كان currentUser موجوداً (حالة التسجيل)، ننتقل مباشرة
      renderMainScreen();
    }
  } else {
    currentUser = null;
    if (postsListener) {
      postsListener();
      postsListener = null;
    }
    renderAuthScreen(true);
  }
});

  // بدء التشغيل (المصادقة ستقرر أي شاشة)
</script>
</body>
</html>
