<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منتدى الكورة والروايات - النسخة المتطورة</title>
  <style>
    /* ============================================================
       1. المتغيرات العامة (الثيم الأساسي + الدارك مود)
       ============================================================ */
    :root {
      --bg-body: #f0f2f5;
      --bg-app: #ffffff;
      --bg-header: linear-gradient(135deg, #1e3c72, #2a5298);
      --text-primary: #1c1e21;
      --text-secondary: #65676b;
      --bg-card: #ffffff;
      --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.08);
      --border-color: #e4e6eb;
      --input-bg: #f7f8fa;
      --accent-blue: #1877f2;
      --accent-hover: #0d65d9;
      --category-football: #e74c3c;
      --category-novels: #8e44ad;
      --like-color: #1877f2;
      --transition-speed: 0.3s;
    }

    /* ثيم الدارك مود */
    body.dark-mode {
      --bg-body: #18191a;
      --bg-app: #242526;
      --bg-header: linear-gradient(135deg, #0b1a30, #1a2a4a);
      --text-primary: #e4e6eb;
      --text-secondary: #b0b3b8;
      --bg-card: #3a3b3c;
      --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.5);
      --border-color: #4e4f50;
      --input-bg: #3a3b3c;
      --accent-blue: #2d88ff;
    }

    /* ============================================================
       2. التنسيقات العامة
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-body);
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
      transition: background var(--transition-speed);
    }

    #app {
      max-width: 720px;
      width: 100%;
      background: var(--bg-app);
      border-radius: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      padding: 24px;
      min-height: 90vh;
      transition: background var(--transition-speed), box-shadow var(--transition-speed);
    }

    /* ============================================================
       3. شاشة تسجيل الدخول (محسنة)
       ============================================================ */
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 75vh;
      gap: 12px;
    }

    .auth-screen .logo {
      font-size: 3.5rem;
      font-weight: 800;
      background: var(--bg-header);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .auth-screen h3 {
      color: var(--text-secondary);
      font-weight: 400;
      margin-bottom: 15px;
    }

    .auth-screen input {
      width: 100%;
      max-width: 320px;
      padding: 14px 20px;
      margin: 5px 0;
      border: 2px solid var(--border-color);
      border-radius: 40px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: 0.2s;
      outline: none;
    }

    .auth-screen input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.2);
    }

    .auth-screen button {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      margin: 5px 0;
      border: none;
      border-radius: 40px;
      background: var(--accent-blue);
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(24, 119, 242, 0.3);
    }

    .auth-screen button:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
      box-shadow: 0 6px 15px rgba(24, 119, 242, 0.4);
    }

    .auth-screen .switch-link {
      color: var(--accent-blue);
      cursor: pointer;
      font-weight: 600;
      margin-top: 12px;
      transition: 0.2s;
    }
    .auth-screen .switch-link:hover {
      text-decoration: underline;
      transform: scale(1.02);
    }

    /* ============================================================
       4. الهيدر + زر الدارك مود
       ============================================================ */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 16px 0;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header .brand {
      font-size: 1.9rem;
      font-weight: 800;
      background: var(--bg-header);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header .user-info .username-badge {
      background: var(--input-bg);
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 600;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    .header .user-info .icon-btn {
      background: var(--input-bg);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header .user-info .icon-btn:hover {
      background: var(--border-color);
      transform: rotate(10deg) scale(1.05);
    }

    .header .user-info .logout-btn {
      background: #e74c3c;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    .header .user-info .logout-btn:hover {
      background: #c0392b;
      transform: scale(0.95);
    }

    /* ============================================================
       5. التبويبات (Tabs) المحسنة
       ============================================================ */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .tabs button {
      flex: 1;
      padding: 12px 6px;
      border: none;
      border-radius: 40px;
      background: var(--input-bg);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.25s;
      border: 2px solid transparent;
      position: relative;
    }

    .tabs button .badge-count {
      background: var(--border-color);
      padding: 0px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: var(--text-primary);
      margin-right: 5px;
    }

    .tabs button.active {
      background: var(--accent-blue);
      color: white;
      box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
      border-color: var(--accent-blue);
    }

    .tabs button.active .badge-count {
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    .tabs button:hover:not(.active) {
      background: var(--border-color);
      transform: translateY(-2px);
    }

    /* ============================================================
       6. نموذج إضافة البوست (محسن)
       ============================================================ */
    .add-post {
      background: var(--input-bg);
      padding: 18px;
      border-radius: 24px;
      margin-bottom: 25px;
      border: 1px solid var(--border-color);
      transition: 0.3s;
    }

    .add-post input,
    .add-post textarea,
    .add-post select {
      width: 100%;
      padding: 12px 18px;
      margin: 6px 0;
      border: 2px solid transparent;
      border-radius: 40px;
      font-size: 0.95rem;
      background: var(--bg-app);
      color: var(--text-primary);
      transition: 0.25s;
      outline: none;
    }

    .add-post input:focus,
    .add-post textarea:focus,
    .add-post select:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.15);
    }

    .add-post textarea {
      border-radius: 20px;
      resize: vertical;
      min-height: 70px;
    }

    .add-post select {
      appearance: none;
      cursor: pointer;
    }

    .add-post .submit-post-btn {
      background: linear-gradient(135deg, #1877f2, #0d65d9);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: all 0.25s;
      box-shadow: 0 4px 10px rgba(24, 119, 242, 0.25);
    }

    .add-post .submit-post-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 18px rgba(24, 119, 242, 0.35);
    }

    /* ============================================================
       7. بطاقات البوستات (Card) - تحفة
       ============================================================ */
    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 18px 20px;
      margin-bottom: 22px;
      box-shadow: var(--shadow-card);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .post-card:hover {
      transform: translateY(-4px) scale(1.005);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    .post-card .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .post-card .post-header .author {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .post-card .post-header .author .avatar {
      width: 32px;
      height: 32px;
      background: var(--accent-blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .post-card .post-header .category-tag {
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .category-tag.football {
      background: var(--category-football);
    }
    .category-tag.novels {
      background: var(--category-novels);
    }

    .post-card .post-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 8px 0 4px;
    }

    .post-card .post-content {
      font-size: 1rem;
      color: var(--text-secondary);
      margin: 6px 0 14px;
      line-height: 1.6;
    }

    /* أزرار التفاعل (لايك - كومنت) */
    .post-card .post-actions {
      display: flex;
      align-items: center;
      gap: 25px;
      border-top: 1px solid var(--border-color);
      padding-top: 14px;
      margin-top: 6px;
    }

    .post-card .post-actions .like-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 40px;
      transition: all 0.2s;
    }

    .post-card .post-actions .like-btn:hover {
      background: var(--input-bg);
    }

    .post-card .post-actions .like-btn.liked {
      color: var(--like-color);
    }

    .post-card .post-actions .like-btn.liked span {
      color: var(--like-color);
    }

    /* تأثير النفخة عند الضغط على اللايك (يتم تشغيله عبر JS) */
    @keyframes likePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.6); }
      100% { transform: scale(1); }
    }
    .post-card .post-actions .like-btn.pop {
      animation: likePop 0.35s ease;
    }

    /* ============================================================
       8. التعليقات (فقاعات دردشة)
       ============================================================ */
    .post-card .comments-section {
      margin-top: 16px;
      border-top: 1px solid var(--border-color);
      padding-top: 16px;
    }

    .post-card .comments-section .comment-bubble {
      background: var(--input-bg);
      padding: 10px 16px;
      border-radius: 18px 18px 18px 4px;
      margin: 6px 0 10px;
      font-size: 0.95rem;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      max-width: 90%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .post-card .comments-section .comment-bubble strong {
      color: var(--accent-blue);
      font-weight: 700;
      display: inline-block;
      margin-left: 6px;
    }

    .post-card .comments-section .add-comment {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
    }

    .post-card .comments-section .add-comment input {
      flex: 1;
      padding: 10px 18px;
      border: 2px solid var(--border-color);
      border-radius: 40px;
      font-size: 0.9rem;
      background: var(--bg-app);
      color: var(--text-primary);
      outline: none;
      transition: 0.2s;
    }

    .post-card .comments-section .add-comment input:focus {
      border-color: var(--accent-blue);
    }

    .post-card .comments-section .add-comment button {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }

    .post-card .comments-section .add-comment button:hover {
      background: var(--accent-hover);
      transform: scale(0.95);
    }

    /* ============================================================
       9. رسائل وخلاصة
       ============================================================ */
    .msg {
      background: var(--input-bg);
      padding: 16px;
      border-radius: 40px;
      text-align: center;
      color: var(--text-secondary);
      border: 1px dashed var(--border-color);
      margin: 15px 0;
      font-weight: 500;
    }

    /* ============================================================
       10. تحسينات إضافية (سكرول ومسافات)
       ============================================================ */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-body);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 10px;
    }

    @media (max-width: 500px) {
      #app { padding: 16px; }
      .header .brand { font-size: 1.4rem; }
      .post-card { padding: 14px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // ============================================================
  //  البيانات و الـ LocalStorage (نفس الكود السابق لكن محسّن)
  // ============================================================
  const STORAGE_KEYS = {
    users: 'forum_users',
    posts: 'forum_posts',
    currentUser: 'forum_currentUser',
    theme: 'forum_theme'
  };

  function getData(key) { return JSON.parse(localStorage.getItem(key)) || []; }
  function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
  function getCurrentUser() { const u = localStorage.getItem(STORAGE_KEYS.currentUser); return u ? JSON.parse(u) : null; }
  function setCurrentUser(user) { user ? localStorage.setItem(STORAGE_KEYS.currentUser, JSON.stringify(user)) : localStorage.removeItem(STORAGE_KEYS.currentUser); }

  // دالة لجلب عدد البوستات حسب التصنيف
  function getCategoryCount(category) {
    const posts = getData(STORAGE_KEYS.posts);
    if (category === 'all') return posts.length;
    return posts.filter(p => p.category === category).length;
  }

  // تهيئة البيانات الافتراضية
  function initDefaultData() {
    if (!localStorage.getItem(STORAGE_KEYS.users)) {
      setData(STORAGE_KEYS.users, [
        { id: '1', username: 'أحمد', email: 'ahmed@test.com', password: '123' },
        { id: '2', username: 'سارة', email: 'sara@test.com', password: '123' }
      ]);
      setData(STORAGE_KEYS.posts, [
        {
          id: 'p1', title: 'أفضل مباراة في تاريخ الكورة', content: 'برأيكم مين الفريق اللي لعب أحسن مباراة في التاريخ؟ أنا شايف إن نهائي 2005 كان تحفة.',
          category: 'football', authorId: '1', authorName: 'أحمد', likes: ['2'],
          comments: [{ id: 'c1', userId: '2', userName: 'سارة', text: 'أنا معاك، لكن نهائي 2022 كان ملحمة!' }],
          createdAt: Date.now() - 3600000
        },
        {
          id: 'p2', title: 'رواية "ألف شمس ساطعة"', content: 'هل قرأتم رواية خالد حسيني؟ تستحق القراءة بجد، بتعكس واقع المرأة الأفغانية.',
          category: 'novels', authorId: '2', authorName: 'سارة', likes: [],
          comments: [{ id: 'c2', userId: '1', userName: 'أحمد', text: 'أنا قرأتها، مؤثرة جدًا.' }],
          createdAt: Date.now() - 7200000
        }
      ]);
    }
  }
  initDefaultData();

  // دوال العمليات
  function getUsers() { return getData(STORAGE_KEYS.users); }
  function setUsers(users) { setData(STORAGE_KEYS.users, users); }
  function getPosts() { return getData(STORAGE_KEYS.posts); }
  function setPosts(posts) { setData(STORAGE_KEYS.posts, posts); }

  function registerUser(username, email, password) {
    const users = getUsers();
    if (users.find(u => u.email === email)) return { error: 'البريد الإلكتروني مستخدم بالفعل' };
    const newUser = { id: Date.now().toString(), username, email, password };
    users.push(newUser);
    setUsers(users);
    const { password: _, ...safe } = newUser;
    return { user: safe };
  }

  function loginUser(email, password) {
    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);
    if (!user) return { error: 'البريد أو كلمة المرور غير صحيحة' };
    const { password: _, ...safe } = user;
    return { user: safe };
  }

  function addPost(title, content, category, authorId, authorName) {
    const posts = getPosts();
    const newPost = { id: 'p' + Date.now(), title, content, category, authorId, authorName, likes: [], comments: [], createdAt: Date.now() };
    posts.unshift(newPost);
    setPosts(posts);
    return newPost;
  }

  function toggleLike(postId, userId) {
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post) return null;
    const idx = post.likes.indexOf(userId);
    if (idx === -1) post.likes.push(userId);
    else post.likes.splice(idx, 1);
    setPosts(posts);
    return post;
  }

  function addComment(postId, userId, userName, text) {
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post) return null;
    post.comments.push({ id: 'c' + Date.now(), userId, userName, text });
    setPosts(posts);
    return post;
  }

  // ============================================================
  //  الواجهة الرئيسية (UI)
  // ============================================================
  const app = document.getElementById('app');

  // تبديل الثيم (Dark/Light)
  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem(STORAGE_KEYS.theme, isDark ? 'dark' : 'light');
  }

  // تطبيق الثيم المحفوظ
  function applySavedTheme() {
    const theme = localStorage.getItem(STORAGE_KEYS.theme);
    if (theme === 'dark') document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
  }
  applySavedTheme();

  // ============================================================
  //  دوال الرندر
  // ============================================================
  function renderAuthScreen(isLogin = true) {
    app.innerHTML = `
      <div class="auth-screen">
        <div class="logo">⚽📚 منتدانا</div>
        <h3>${isLogin ? 'أهلاً بك مرة أخرى 👋' : 'انضم إلينا الآن 🚀'}</h3>
        <div id="authForm">
          ${!isLogin ? `<input type="text" id="regUsername" placeholder="اسم المستخدم" />` : ''}
          <input type="email" id="authEmail" placeholder="البريد الإلكتروني" />
          <input type="password" id="authPassword" placeholder="كلمة المرور" />
          <button id="authSubmitBtn">${isLogin ? 'دخول' : 'إنشاء حساب'}</button>
        </div>
        <div class="switch-link" id="switchAuthMode">${isLogin ? 'ليس لديك حساب؟ سجل الآن' : 'لديك حساب؟ سجل دخول'}</div>
        <div id="authMsg" class="msg" style="display:none;"></div>
      </div>
    `;

    document.getElementById('authSubmitBtn').addEventListener('click', () => {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      const msgDiv = document.getElementById('authMsg');
      if (!email || !password) { msgDiv.style.display = 'block'; msgDiv.textContent = 'يرجى ملء جميع الحقول'; return; }

      if (isLogin) {
        const result = loginUser(email, password);
        if (result.error) { msgDiv.style.display = 'block'; msgDiv.textContent = result.error; }
        else { setCurrentUser(result.user); renderMainScreen(); }
      } else {
        const username = document.getElementById('regUsername').value.trim();
        if (!username) { msgDiv.style.display = 'block'; msgDiv.textContent = 'يرجى كتابة اسم المستخدم'; return; }
        const result = registerUser(username, email, password);
        if (result.error) { msgDiv.style.display = 'block'; msgDiv.textContent = result.error; }
        else { setCurrentUser(result.user); renderMainScreen(); }
      }
    });

    document.getElementById('switchAuthMode').addEventListener('click', () => renderAuthScreen(!isLogin));
  }

  function renderMainScreen() {
    const user = getCurrentUser();
    if (!user) { renderAuthScreen(true); return; }

    let currentCategory = localStorage.getItem('forum_categoryFilter') || 'all';

    function renderPosts(category) {
      const posts = getPosts();
      let filtered = category === 'all' ? posts : posts.filter(p => p.category === category);
      const container = document.getElementById('feedContainer');
      if (!container) return;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="msg">📭 لا توجد بوستات في هذا القسم، كن أول من يكتب!</div>`;
        return;
      }

      container.innerHTML = filtered.map(post => {
        const isLiked = post.likes.includes(user.id);
        const catClass = post.category === 'football' ? 'football' : 'novels';
        const catEmoji = post.category === 'football' ? '⚽' : '📖';
        return `
          <div class="post-card" data-post-id="${post.id}">
            <div class="post-header">
              <span class="author">
                <span class="avatar">${post.authorName.charAt(0)}</span>
                ${post.authorName}
              </span>
              <span class="category-tag ${catClass}">${catEmoji} ${post.category === 'football' ? 'كرة' : 'روايات'}</span>
            </div>
            <div class="post-title">${post.title}</div>
            <div class="post-content">${post.content}</div>
            <div class="post-actions">
              <button class="like-btn ${isLiked ? 'liked' : ''}" data-postid="${post.id}">
                ${isLiked ? '❤️' : '🤍'} <span>${post.likes.length}</span>
              </button>
              <span style="color:var(--text-secondary);font-size:0.9rem;">💬 ${post.comments.length}</span>
            </div>
            <div class="comments-section">
              ${post.comments.map(c => `
                <div class="comment-bubble"><strong>${c.userName}</strong> ${c.text}</div>
              `).join('')}
              <div class="add-comment">
                <input type="text" placeholder="اكتب تعليق..." class="comment-input" />
                <button class="comment-submit" data-postid="${post.id}">نشر</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // أحداث اللايك (مع تأثير النفخة)
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const postId = this.dataset.postid;
          const updatedPost = toggleLike(postId, user.id);
          if (updatedPost) {
            // إضافة كلاس النفخة
            this.classList.add('pop');
            setTimeout(() => this.classList.remove('pop'), 400);
            renderPosts(currentCategory);
          }
        });
      });

      // أحداث الكومنت
      document.querySelectorAll('.comment-submit').forEach(btn => {
        btn.addEventListener('click', function() {
          const postId = this.dataset.postid;
          const input = this.parentElement.querySelector('.comment-input');
          const text = input.value.trim();
          if (!text) return;
          addComment(postId, user.id, user.username, text);
          renderPosts(currentCategory);
        });
      });
    }

    // بناء الواجهة
    app.innerHTML = `
      <div class="header">
        <div class="brand">⚽📚 منتدانا</div>
        <div class="user-info">
          <span class="username-badge">👋 ${user.username}</span>
          <button class="icon-btn" id="themeToggle" title="تبديل الوضع الداكن">🌙</button>
          <button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
        </div>
      </div>

      <div class="tabs">
        <button class="${currentCategory === 'all' ? 'active' : ''}" data-cat="all">
          📰 الكل <span class="badge-count">${getCategoryCount('all')}</span>
        </button>
        <button class="${currentCategory === 'football' ? 'active' : ''}" data-cat="football">
          ⚽ كرة <span class="badge-count">${getCategoryCount('football')}</span>
        </button>
        <button class="${currentCategory === 'novels' ? 'active' : ''}" data-cat="novels">
          📖 روايات <span class="badge-count">${getCategoryCount('novels')}</span>
        </button>
      </div>

      <div class="add-post">
        <input type="text" id="postTitle" placeholder="عنوان البوست..." />
        <textarea id="postContent" placeholder="محتوى البوست..."></textarea>
        <select id="postCategory">
          <option value="football">⚽ كرة القدم</option>
          <option value="novels">📖 روايات</option>
        </select>
        <button class="submit-post-btn" id="addPostBtn">➕ إضافة بوست جديد</button>
      </div>

      <div id="feedContainer"></div>
    `;

    // أحداث التبويب
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', function() {
        localStorage.setItem('forum_categoryFilter', this.dataset.cat);
        renderMainScreen();
      });
    });

    // حدث إضافة بوست
    document.getElementById('addPostBtn').addEventListener('click', () => {
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      const category = document.getElementById('postCategory').value;
      if (!title || !content) { alert('يرجى كتابة العنوان والمحتوى'); return; }
      addPost(title, content, category, user.id, user.username);
      renderMainScreen();
    });

    // حدث تسجيل الخروج
    document.getElementById('logoutBtn').addEventListener('click', () => {
      setCurrentUser(null);
      renderAuthScreen(true);
    });

    // حدث تبديل الثيم
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    renderPosts(currentCategory);
  }

  // ============================================================
  //  تشغيل التطبيق
  // ============================================================
  if (getCurrentUser()) renderMainScreen();
  else renderAuthScreen(true);
</script>
</body>
</html>
